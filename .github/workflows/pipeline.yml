# =================================================================
#  pipeline.yml
#  Place at: .github/workflows/pipeline.yml
#
#  Full CI/CD pipeline for customers.php — deploys to Vercel
#  Trigger : push to main branch
#  Stages  : Build → Test → Security Scan → Deploy (Vercel)
#
#  Fixed: upgraded all actions to Node.js 24 compatible versions
#         actions/cache@v4, actions/upload-artifact@v4 (latest)
#         added FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true
#         fixed coverage dir creation before PHPUnit runs
# =================================================================

name: customers.php CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  PHP_VERSION: "8.2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 now

# =================================================================
#  STAGE 1 — BUILD
# =================================================================
jobs:

  build:
    name: "Build & Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4        # upgraded from v3 → v4
        with:
          path: vendor/
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Lint all PHP files
        run: |
          echo "Checking PHP syntax..."
          find . -name "*.php" -not -path "./vendor/*" | while read file; do
            php -l "$file" || exit 1
          done
          echo "All PHP files passed lint."

# =================================================================
#  STAGE 2 — TEST
# =================================================================

  test:
    name: "Unit & Integration Tests"
    runs-on: ubuntu-latest
    needs: build

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_secret
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASS: test_pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring
          coverage: xdebug

      - name: Cache Composer packages
        uses: actions/cache@v4        # upgraded from v3 → v4
        with:
          path: vendor/
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Wait for MySQL to be ready
        run: |
          until mysqladmin ping -h 127.0.0.1 -u test_user -ptest_pass --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL is ready."

      - name: Seed test database
        run: mysql -h 127.0.0.1 -u test_user -ptest_pass test_db < setup.sql

      - name: Create coverage output directory
        run: mkdir -p coverage          # fixed: PHPUnit needs this dir to exist

      - name: Run unit tests
        run: vendor/bin/phpunit tests/unit --testdox

      - name: Run integration tests
        run: vendor/bin/phpunit tests/integration --testdox

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

# =================================================================
#  STAGE 3 — SECURITY SCAN
# =================================================================

  security:
    name: "OWASP Security Scan"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP & install dependencies
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "customers-php"
          path: "."
          format: "HTML"
          out: "owasp-report"
          args: >
            --failOnCVSS 7
            --enableRetired
            --exclude "**/tests/**"
            --exclude "**/vendor/phpunit/**"

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: owasp-report/

# =================================================================
#  STAGE 4 — DEPLOY TO VERCEL
# =================================================================

  deploy:
    name: "Deploy to Vercel"
    runs-on: ubuntu-latest
    needs: security
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment & project settings
        run: |
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project with Vercel
        run: |
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOYMENT_URL"

      - name: Smoke test live deployment
        run: |
          URL="${{ steps.deploy.outputs.url }}/customers"
          echo "Smoke testing: $URL"
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL")
            if [ "$HTTP" = "200" ]; then
              echo "HTTP 200 confirmed on attempt $i."
              break
            fi
            echo "Attempt $i: got HTTP $HTTP — retrying in 5s..."
            sleep 5
          done
          if [ "$HTTP" != "200" ]; then
            echo "SMOKE TEST FAILED — HTTP $HTTP"
            vercel rollback --token=${{ secrets.VERCEL_TOKEN }} --yes
            exit 1
          fi
          BODY=$(curl -s --max-time 30 "$URL")
          if ! echo "$BODY" | grep -qi "<table"; then
            echo "SMOKE TEST FAILED — no table found in response"
            vercel rollback --token=${{ secrets.VERCEL_TOKEN }} --yes
            exit 1
          fi
          echo "All smoke tests passed."

      - name: Print deployment summary
        run: |
          echo "================================================"
          echo "  DEPLOYMENT SUCCESSFUL"
          echo "  URL     : ${{ steps.deploy.outputs.url }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Author  : ${{ github.actor }}"
          echo "================================================"
