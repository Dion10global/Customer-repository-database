# =================================================================
#  nightly-security.yml — Fixed: Node.js 24, cache@v4
# =================================================================

name: Nightly Security Scan

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  PHP_VERSION: "8.2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  owasp-scan:
    name: "OWASP Dependency-Check"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
      - uses: actions/cache@v4
        with:
          path: vendor/
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-
      - run: composer install --no-interaction --prefer-dist
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "customers-php"
          path: "."
          format: "HTML"
          out: "owasp-report"
          args: >
            --failOnCVSS 7
            --enableRetired
            --exclude "**/tests/**"
            --exclude "**/vendor/phpunit/**"
      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-owasp-${{ github.run_number }}
          path: owasp-report/
          retention-days: 30
      - name: Fail with instructions
        if: failure()
        run: |
          echo "::error::Nightly OWASP scan FAILED — a new CVE was found."
          echo "::error::Download the 'nightly-owasp' artifact to see affected packages."
          echo "::error::Update the vulnerable package in composer.json and push to fix."
