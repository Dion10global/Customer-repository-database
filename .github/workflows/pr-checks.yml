# =================================================================
#  pr-checks.yml
#  Place at: .github/workflows/pr-checks.yml
#
#  Lightweight checks that run on every Pull Request.
#  Does NOT deploy — that only happens when PR is merged to main.
#  Gives fast feedback before code is approved.
# =================================================================

name: PR Checks

on:
  pull_request:
    branches:
      - main

env:
  PHP_VERSION: "8.2"

jobs:

  # ── Lint only (fastest feedback, runs first) ─────────────────
  lint:
    name: "PHP Lint"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint PHP files
        run: |
          find . -name "*.php" -not -path "./vendor/*" | while read f; do
            php -l "$f" || exit 1
          done

  # ── Unit tests only (no DB needed, very fast) ─────────────────
  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: vendor/bin/phpunit tests/unit --testdox

  # ── Integration tests with DB (runs after unit tests) ─────────
  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_secret
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASS: test_pass

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -u test_user -ptest_pass --silent; do
            sleep 2
          done

      - name: Seed test database
        run: mysql -h 127.0.0.1 -u test_user -ptest_pass test_db < setup.sql

      - name: Run integration tests
        run: vendor/bin/phpunit tests/integration --testdox
