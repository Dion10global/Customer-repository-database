# =================================================================
#  pr-checks.yml — Fixed: Node.js 24, cache@v4, coverage dir
# =================================================================

name: PR Checks & Preview Deploy

on:
  pull_request:
    branches:
      - main

env:
  PHP_VERSION: "8.2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  lint:
    name: "PHP Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql
      - uses: actions/cache@v4
        with:
          path: vendor/
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-
      - run: composer install --no-interaction --prefer-dist
      - name: Lint PHP files
        run: |
          find . -name "*.php" -not -path "./vendor/*" | while read f; do
            php -l "$f" || exit 1
          done

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql
      - uses: actions/cache@v4
        with:
          path: vendor/
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/phpunit tests/unit --testdox

  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_secret
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASS: test_pass

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql
      - uses: actions/cache@v4
        with:
          path: vendor/
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-
      - run: composer install --no-interaction --prefer-dist
      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -u test_user -ptest_pass --silent; do
            sleep 2
          done
      - run: mysql -h 127.0.0.1 -u test_user -ptest_pass test_db < setup.sql
      - run: vendor/bin/phpunit tests/integration --testdox

  preview-deploy:
    name: "Vercel Preview Deploy"
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build for preview
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy preview
        id: preview
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Vercel Preview Deployment\n\n✅ Preview is live: ${{ steps.preview.outputs.url }}\n\nThis preview will be promoted to production when this PR is merged to \`main\`.`
            })
