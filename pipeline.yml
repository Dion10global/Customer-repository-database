# ============================================================
#  CI/CD Pipeline — customers.php
#  Cloud Application Development: Practical Test 2 — Q2
#
#  Platform: GitHub Actions  |  Deploy target: Heroku (PaaS)
#  Trigger:  Push to main branch
# ============================================================

name: customers.php CI/CD Pipeline

# ── TRIGGER ─────────────────────────────────────────────────
on:
  push:
    branches:
      - main          # Pipeline runs on every push to main

# ── ENVIRONMENT VARIABLES ────────────────────────────────────
env:
  PHP_VERSION: "8.2"
  APP_NAME: customers-php-app      # Your Heroku app name
  HEROKU_BLUE_APP:  customers-blue  # Blue environment
  HEROKU_GREEN_APP: customers-green # Green environment

# ════════════════════════════════════════════════════════════
#  STAGE 1: BUILD
#  - Install PHP dependencies via Composer
#  - Run PHP linter across all source files
# ════════════════════════════════════════════════════════════
jobs:

  build:
    name: "Stage 1 — Build & Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: vendor/
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies (Composer)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Lint PHP files
        run: |
          echo "Running PHP syntax check on all .php files..."
          find . -name "*.php" -not -path "./vendor/*" | while read file; do
            php -l "$file" || exit 1
          done
          echo "All files passed lint check."

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            .
            !.git
            !tests/


# ════════════════════════════════════════════════════════════
#  STAGE 2: TEST
#  - Unit tests (PHPUnit)
#  - Integration tests against a real test MySQL database
#    spun up as a GitHub Actions service container
# ════════════════════════════════════════════════════════════

  test:
    name: "Stage 2 — Unit & Integration Tests"
    runs-on: ubuntu-latest
    needs: build   # Only runs if build passes

    # Spin up a MySQL service container for integration tests
    services:
      mysql_test:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_pass
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASS: test_pass

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Wait for MySQL to be ready
        run: |
          until mysqladmin ping -h 127.0.0.1 -u test_user -ptest_pass --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Seed test database
        run: mysql -h 127.0.0.1 -u test_user -ptest_pass test_db < setup.sql

      - name: Run unit tests
        run: vendor/bin/phpunit tests/unit --testdox

      - name: Run integration tests (against test DB)
        run: vendor/bin/phpunit tests/integration --testdox

      - name: Upload test coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/


# ════════════════════════════════════════════════════════════
#  STAGE 3: SECURITY SCAN
#  - OWASP Dependency-Check scans all Composer packages
#    for known CVEs in the NVD database
#  - Fails the pipeline if a CVSS score >= 7 is found
# ════════════════════════════════════════════════════════════

  security-scan:
    name: "Stage 3 — OWASP Dependency Check"
    runs-on: ubuntu-latest
    needs: test   # Only runs after tests pass

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up PHP & install dependencies
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
      - run: composer install --no-interaction --prefer-dist

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "customers-php"
          path: "."
          format: "HTML"
          out: "owasp-report"
          args: >
            --failOnCVSS 7
            --enableRetired
            --exclude "**/tests/**"

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()   # Upload even if scan fails so we can inspect findings
        with:
          name: owasp-dependency-report
          path: owasp-report/


# ════════════════════════════════════════════════════════════
#  STAGE 4: DEPLOY  (Blue-Green / Zero Downtime)
#
#  Strategy:
#    1. Deploy new version to the INACTIVE environment (Green)
#    2. Run smoke tests against Green
#    3. If smoke tests pass → flip the router to Green (it becomes live)
#    4. Blue becomes the new inactive standby
#    5. If smoke tests FAIL → leave Blue live, Green is discarded
#
#  This guarantees zero downtime — users always hit a live app.
# ════════════════════════════════════════════════════════════

  deploy:
    name: "Stage 4 — Blue-Green Deploy (Zero Downtime)"
    runs-on: ubuntu-latest
    needs: security-scan   # Only deploys after security scan passes
    environment: production

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Heroku CLI
        run: |
          curl https://cli-assets.heroku.com/install.sh | sh
          heroku --version

      - name: Authenticate with Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku auth:token

      # ── Determine which slot is currently LIVE ──────────────
      - name: Detect active/inactive slots
        id: slots
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          ACTIVE=$(heroku config:get ACTIVE_SLOT --app ${{ env.APP_NAME }})
          if [ "$ACTIVE" = "blue" ]; then
            echo "DEPLOY_TO=green"  >> $GITHUB_OUTPUT
            echo "ROLLBACK_TO=blue" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_TO=blue"   >> $GITHUB_OUTPUT
            echo "ROLLBACK_TO=green">> $GITHUB_OUTPUT
          fi
          echo "Active slot is: $ACTIVE — deploying to: $(cat $GITHUB_OUTPUT | grep DEPLOY_TO | cut -d= -f2)"

      # ── Deploy to the INACTIVE slot ─────────────────────────
      - name: Deploy to inactive slot (${{ steps.slots.outputs.DEPLOY_TO }})
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          DEPLOY_APP: customers-${{ steps.slots.outputs.DEPLOY_TO }}
        run: |
          git remote add heroku-deploy https://heroku:${HEROKU_API_KEY}@git.heroku.com/${DEPLOY_APP}.git
          git push heroku-deploy main --force
          echo "Deployed to ${DEPLOY_APP} — running smoke tests before routing traffic..."

      # ── Smoke tests on the inactive slot ───────────────────
      - name: Smoke test inactive slot
        env:
          DEPLOY_APP: customers-${{ steps.slots.outputs.DEPLOY_TO }}
        run: |
          APP_URL="https://${DEPLOY_APP}.herokuapp.com/customers.php"
          echo "Testing: $APP_URL"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "SMOKE TEST FAILED — HTTP $HTTP_CODE. Aborting. Live traffic unchanged."
            exit 1
          fi

          # Check the response contains expected HTML elements
          BODY=$(curl -s "$APP_URL")
          if ! echo "$BODY" | grep -q "<table"; then
            echo "SMOKE TEST FAILED — No table found in response. Aborting."
            exit 1
          fi
          echo "Smoke tests passed — switching traffic to $DEPLOY_APP"

      # ── Flip the router (zero-downtime cutover) ─────────────
      - name: Switch live traffic to new slot
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          DEPLOY_APP: customers-${{ steps.slots.outputs.DEPLOY_TO }}
        run: |
          heroku config:set ACTIVE_SLOT=${{ steps.slots.outputs.DEPLOY_TO }} --app ${{ env.APP_NAME }}
          echo "Traffic now routing to: $DEPLOY_APP"
          echo "Previous slot (${{ steps.slots.outputs.ROLLBACK_TO }}) is now on standby."

      # ── Notify on success ───────────────────────────────────
      - name: Deployment summary
        run: |
          echo "========================================"
          echo "  DEPLOYMENT COMPLETE"
          echo "  Live slot : ${{ steps.slots.outputs.DEPLOY_TO }}"
          echo "  Standby   : ${{ steps.slots.outputs.ROLLBACK_TO }}"
          echo "  Commit    : ${{ github.sha }}"
          echo "========================================"
